version: '3.8'

services:
  sync-odds-history:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      - NODE_ENV=production
      - DATABASE_URI=${DATABASE_URI}
      - PAYLOAD_SECRET=${PAYLOAD_SECRET}
      - LIVESCORE_API_BASE=${LIVESCORE_API_BASE}
      - LIVESCORE_KEY=${LIVESCORE_KEY}
      - LIVESCORE_SECRET=${LIVESCORE_SECRET}
    command: ["node", "scripts/sync-odds-history.mjs"]
    restart: "no"  # Одноразовый запуск
    networks:
      - app-network
    depends_on:
      - mongodb

  # Cron job для запуска каждые 30 секунд
  sync-odds-history-cron:
    image: alpine:latest
    command: sh -c "echo '*/1 * * * * sleep 30; /usr/local/bin/docker-compose -f docker-compose.sync-odds-history.yml up sync-odds-history' >> /etc/crontabs/root && crond -f"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker-compose.sync-odds-history.yml:/app/docker-compose.sync-odds-history.yml
      - /usr/local/bin/docker-compose:/usr/local/bin/docker-compose
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    external: true