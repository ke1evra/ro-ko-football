name: appstack

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    # Используем сеть хоста напрямую. Это самый надежный способ
    # для контейнера получить доступ к сервисам, запущенным на хосте (MongoDB и т.д.).
    network_mode: 'host'
    # Директивы 'ports' и 'extra_hosts' игнорируются при network_mode: host

    # Файл .env должен содержать правильные значения для:
    # - APP_URL: реальный домен сервера (например, https://rocoscore.ru)
    # - DATABASE_URI: mongodb://user:pass@127.0.0.1:27017/db (с 127.0.0.1 для network_mode: host)
    env_file:
      - ./.env

    # Значения по умолчанию используются только если переменные НЕ заданы в .env
    environment:
      # MongoDB: используйте 127.0.0.1 или localhost (НЕ mongodb service name!)
      DATABASE_URI: ${DATABASE_URI:-mongodb://syncadmin:syncadminsyncadmin123qQ!@127.0.0.1:27017/payload?authSource=admin}
      PAYLOAD_SECRET: ${PAYLOAD_SECRET}
      NODE_ENV: ${NODE_ENV}
      # ВАЖНО: APP_URL должен быть реальным доменом сервера!
      # Примеры: https://rocoscore.ru, http://91.209.135.34:3100
      # localhost НЕ будет работать при обращении с другого устройства!
      APP_URL: ${APP_URL:-http://localhost:3100}
      LIVESCORE_KEY: ${LIVESCORE_KEY}
      LIVESCORE_SECRET: ${LIVESCORE_SECRET}

    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8g
        reservations:
          cpus: '2.0'
          memory: 4g
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3100').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped
